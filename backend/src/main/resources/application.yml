server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tuition-manager
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/tuition_manager}
    username: ${SPRING_DATASOURCE_USERNAME:tuition}
    password: ${SPRING_DATASOURCE_PASSWORD:tuition}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt-secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
  jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  upload-dir: ${UPLOAD_DIR:uploads}
  cors-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: DEBUG
