services:
  postgres:
    image: postgres:16-alpine
    container_name: tuition-manager-postgres
    environment:
      POSTGRES_DB: tuition_manager
      POSTGRES_USER: tuition
      POSTGRES_PASSWORD: tuition
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuition -d tuition_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tuition-manager-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tuition_manager
      SPRING_DATASOURCE_USERNAME: tuition
      SPRING_DATASOURCE_PASSWORD: tuition
      JWT_SECRET: replace-with-a-long-random-production-secret
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: tuition-manager-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
  uploads:
